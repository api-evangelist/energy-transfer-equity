description: >-
  Energy Transfer Equity, L.P. (ETE) was a master limited partnership that owned
  and operated a diverse portfolio of midstream energy assets. In October 2018,
  ETE merged with its operating subsidiary Energy Transfer Partners (ETP) to form
  a single publicly traded partnership, Energy Transfer LP (NYSE: ET). All
  developer resources, including the Messenger+ API for pipeline messaging and
  gas scheduling, are now provided under the Energy Transfer LP brand.
